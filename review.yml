    summary: >-
      Verified two live OAI-PMH 2.0 metadata-harvesting interfaces: the
      EPrints-based University of Liverpool Repository and the DataCat research
      data catalogue. Both responded to the Identify verb, and the Repository
      exposed metadata formats (oai_dc, mets, didl, rdf, rioxx, uketd_dc) via
      ListMetadataFormats. No public, documented general-purpose API developer
      portal, course/timetable API, or self-service API key program was found.
      The livuni GitHub org is a small academic/research org, not an official
      institutional API publisher. SSO/IdP and status hosts did not resolve
      publicly. No endpoints were fabricated; only verified URLs are listed.
