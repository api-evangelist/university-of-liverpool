---
aid: university-of-liverpool
name: University of Liverpool
description: >-
  The University of Liverpool is a public research university in Liverpool,
  United Kingdom, a founding member of the Russell Group, ranked #165 in the QS
  World University Rankings 2025. Its public, machine-readable developer
  footprint is centered on scholarly and research-data infrastructure rather
  than a unified developer portal: the EPrints-based University of Liverpool
  Repository and the DataCat research data catalogue both expose live OAI-PMH
  metadata-harvesting interfaces. No general-purpose public API developer
  portal, course/timetable API, or self-service API key program was found to be
  publicly documented at the time of review; most institutional systems
  (SSO/IdP, student administration, mobile backends) sit behind authentication
  and are not publicly cataloged.
